<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCANEEE</title>

<style>

body {
    margin: 0;
    height: 100vh;
    display: grid;
    place-items: center;
    transition: background-color 0.4s ease;
    overflow: hidden;
    background: rgb(199, 199, 199);
}

/* BACKGROUND */

#background-effects {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
}

/* GRID */

.grid {
    display: grid;
    grid-template-columns: 300px 300px 300px;
    grid-template-rows: 200px 200px 200px;
    gap: 120px;
    align-items: center;
    justify-items: center;
    position: relative;
    z-index: 2;
}

h1 {
    font-size: 80px;
    margin: 0;
    cursor: pointer;
    transition: 0.3s;
}

.jinx { color: powderblue; }
.vi { color: violet; }
.cait { color: #DEDAEE; }
.ekko { color: #2b1c05; }
.isha { color: rgb(108, 42, 0); }

.active { transform: scale(1.4); }
.fade { opacity: 0.6; transform: scale(0.85); }

/* 💥 SCREEN BREAK MODE */
.glitch-screen {
    animation: shake 0.1s infinite;
}

@keyframes shake {
    0% { transform: translate(0,0); }
    25% { transform: translate(-1px,1px); }
    50% { transform: translate(2px,-1px); }
    75% { transform: translate(-2px,2px); }
    100% { transform: translate(0,0); }
}

/* 🧊 CRACK LINES */
.crack {
    position: fixed;
    background: rgba(255,255,255,0.7);
    z-index: 10;
    pointer-events: none;
    animation: crackFade 4s forwards;
}

@keyframes crackFade {
    0% { opacity: 0; transform: scale(0); }
    20% { opacity: 1; }
    100% { opacity: 0; transform: scale(1.5); }
}

/* 🖱️ CURSOR TRAIL */
.cursor-dot {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: cyan;
    box-shadow: 0 0 10px cyan, 0 0 20px blue;
    pointer-events: none;
    z-index: 999;
    animation: fadeDot 0.8s forwards;
}

@keyframes fadeDot {
    to { transform: scale(0); opacity: 0; }
}

</style>
</head>

<body id="page">

<div id="background-effects"></div>

<div class="grid">
    <h1 class="vi">VI</h1>
    <div></div>
    <h1 class="cait">Caitlyn</h1>

    <div></div>
    <h1 class="isha">ISHA</h1>

    <div></div>
    <h1 class="jinx">Jinx</h1>

    <div></div>
    <h1 class="ekko">Ekko</h1>
</div>

<script>

const page = document.getElementById("page");
const chars = document.querySelectorAll("h1");

let crackInterval;
let hoverTime = 0;
let glitchActive = false;

/* 🧠 CRACK SYSTEM (GETS WORSE OVER TIME) */
function startCracks() {

    crackInterval = setInterval(() => {

        hoverTime++;

        for (let i = 0; i < hoverTime / 3; i++) {

            const crack = document.createElement("div");
            crack.classList.add("crack");

            crack.style.left = Math.random() * 100 + "vw";
            crack.style.top = Math.random() * 100 + "vh";

            const size = 50 + Math.random() * 300;

            crack.style.width = size + "px";
            crack.style.height = "2px";

            crack.style.transform = `rotate(${Math.random() * 360}deg)`;

            document.body.appendChild(crack);

            setTimeout(() => crack.remove(), 4000);
        }

    }, 500);
}

/* 🖱️ CURSOR TRAIL */
document.addEventListener("mousemove", (e) => {

    if (!glitchActive) return;

    const dot = document.createElement("div");
    dot.classList.add("cursor-dot");

    dot.style.left = e.clientX + "px";
    dot.style.top = e.clientY + "px";

    document.body.appendChild(dot);

    setTimeout(() => dot.remove(), 800);
});

/* STOP EVERYTHING */
function resetGlitch() {
    clearInterval(crackInterval);
    hoverTime = 0;
    glitchActive = false;
    page.classList.remove("glitch-screen");
}

/* HOVER SYSTEM */

chars.forEach(char => {

    char.addEventListener("mouseenter", () => {

        const cls = char.classList[0];

        if (cls === "jinx") {

            glitchActive = true;
            page.classList.add("glitch-screen");

            startCracks();
        }
    });
});

/* RESET */
document.querySelector(".grid").addEventListener("mouseleave", () => {
    resetGlitch();
});

</script>

</body>
</html>
