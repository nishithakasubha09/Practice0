<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: grid;
        place-items: center;
    }

    .grid {
        display: grid;
        grid-template-columns: 300px 300px 300px;
        grid-template-rows: 200px 200px 200px;
        gap: 120px;
        align-items: center;
        justify-items: center;
    }

    h1 {
        font-size: 80px;
        margin: 0;
    }

   .jinx { color: powderblue; } 
   .jinx:hover{ color:#206B9F } 
   .vi { color: violet; } 
   .vi:hover{ color: black } 
   .cait { color: #282A4A; } 
   .cait:hover{ color: antiquewhite; background-color: #282A4A; } 
   .ekko { color: #5D503D; } 
   .ekko:hover{
    color: green}
   .isha { color: rgb(198, 91, 24); } 
   .isha:hover{ color: rgb(96, 13, 13) }
</style>
</head>

<body>

<div class="grid">
    <h1 class="vi">VI</h1>
    <div></div>
    <h1 class="cait">Caitlyn</h1>

    <div></div>
    <h1 class="isha">ISHA</h1>
    <div></div>

    <h1 class="jinx">Jinx</h1>
    <div></div>
    <h1 class="ekko">Ekko</h1>
</div>

</body>
</html>
