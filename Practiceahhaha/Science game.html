<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Science Data</title>
    <style>
        body {
            background-color: #222;
            color: white;
            font-family: Georgia, "Times New Roman", serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        #status {
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        
        /* The main 3x3 container */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            background-color: #333;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        
        /* Individual game buttons */
        .grid-button {
            background-color: darkcyan;
            height: 150px;
            width: 150px;
            border: 5px rgb(0, 85, 85) solid;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.1s, transform 0.1s;
        }
        
        .grid-button:hover {
            background-color: rgba(0, 85, 85, 0.666);
        }

        /* The active "lit up" state */
        .grid-button.active {
            background-color: cyan !important;
            box-shadow: cyan;
            transform: scale(1.05);
        }

        #start-btn {
            margin-top: 20px;
            padding: 10px 25px;
            font-size: 18px;
            background-color: #008b8b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #start-btn:hover {
            background-color: #1f8f8f;
        }
    </style>
</head>
<body>

    <div id="status">Press Start to Play!</div>

    <div class="grid-container">
        <button class="grid-button" id="btn-0"></button>
        <button class="grid-button" id="btn-1"></button>
        <button class="grid-button" id="btn-2"></button>
        <button class="grid-button" id="btn-3"></button>
        <button class="grid-button" id="btn-4"></button>
        <button class="grid-button" id="btn-5"></button>
        <button class="grid-button" id="btn-6"></button>
        <button class="grid-button" id="btn-7"></button>
        <button class="grid-button" id="btn-8"></button>
    </div>

    <button id="start-btn">Start Game</button>

    <script>
        let gameSequence = [];
        let playerSequence = [];
        let level = 0;
        let isPlayingSequence = false;

        const statusText = document.getElementById('status');
        const startButton = document.getElementById('start-btn');
        const buttons = document.querySelectorAll('.grid-button');

        startButton.addEventListener('click', startGame);

        buttons.forEach(button => {
            button.addEventListener('click', (e) => {
                if (isPlayingSequence || gameSequence.length === 0) return;

                const btnId = parseInt(e.target.id.replace('btn-', ''));
                flashButton(btnId);
                playerSequence.push(btnId);
                
                checkPlayerInput(playerSequence.length - 1);
            });
        });

        function startGame() {
            gameSequence = [];
            level = 0;
            startButton.style.display = 'none';
            nextLevel();
        }

        function nextLevel() {
            playerSequence = [];
            level++;
            statusText.innerText = `Level ${level}`;
            
            const randomBox = Math.floor(Math.random() * 9);
            gameSequence.push(randomBox);
            
            playSequence();
        }

        async function playSequence() {
            isPlayingSequence = true;
            await delay(600); 

            for (let i = 0; i < gameSequence.length; i++) {
                flashButton(gameSequence[i]);
                await delay(600);
            }
            isPlayingSequence = false;
        }

        function flashButton(id) {
            const btn = document.getElementById(`btn-${id}`);
            btn.classList.add('active');
            setTimeout(() => {
                btn.classList.remove('active');
            }, 300);
        }

        function checkPlayerInput(currentIndex) {
            if (playerSequence[currentIndex] !== gameSequence[currentIndex]) {
                statusText.innerText = `Game Over! You reached Level ${level}`;
                startButton.innerText = 'Play Again';
                startButton.style.display = 'block';
                gameSequence = [];
                return;
            }

            if (playerSequence.length === gameSequence.length) {
                nextLevel();
            }
        }

        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
    </script>
</body>
</html>
