<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            height: 300px;
            width: 600px;
            border: 2px solid black;
        }

        .box{
            height: 50px;
            width: 50px;
            margin: 5px;
        }

        .static{
            position: static;
            background-color: palegreen;
            border: 2px solid black;
            margin: 10px;
        }

        .absolute{
            position: absolute;
            background-color: aquamarine;
            margin: 10px;
            border: 2px solid black;
            top: 60px;
            left: 50px;
            box-shadow: 2px 20px 10px black;
        }

        .relative{
            position: relative;
            background-color: seagreen;
            top: 40px;
            bottom: 20px;
            border: 2px solid black;
        }

        .fixed{
            position: fixed;
            background-color: royalblue;
            border:2px solid black ;
            top: 100px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box static"> static</div>
        <div class="box absolute"> absolute</div>
        <div class="box relative"> relative</div>
        <div class="box fixed"> fixed</div>
    </div>
</body>
</html>
