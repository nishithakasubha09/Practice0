<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nav bar</title>
    <link rel="stylesheet" href="preset.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Lato", sans-serif;
        }

        body {
            font-size: 1rem;
            color: gray;
        }

        a {
            text-decoration: none;
        }

        li {
            list-style: none;
        }

        header {
            height: 100vh;
            background-color: darkslategray;
        }


        header h2 {
            text-transform: uppercase;
            width: fit-content;
            border-bottom: 1px solid lightgoldenrodyellow;
        }

        .nav-line {
            font-size: 120%;
            margin-right: 1.2rem;
            /* margin-top: 1.1rem; */
            padding-bottom: 0.5rem;
            border-bottom: 0.1rem solid transparent;
        }

        .white-anchors {
            color: white;
        }

        section {
            height: 100vh;
            background-color: grey;
            color: white;
            text-transform: uppercase;
        }


        .nav-line:hover {
            border-bottom: 0.1rem solid #f63854;
        }

        .navigation{
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .nav-line{
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <ul class="navigation">
                <li class="nav-line"><a class="white-anchors " href="#features">FEATURES</a></li>
                <li class="nav-line"><a class="white-anchors" href="#details">DETAILS</a></li>
                <li class="nav-line"><a class="white-anchors" href="#reviews">REVIEWS</a></li>
                <li class="nav-line"><a class="white-anchors" href="#plans">PLANS</a></li>
                <li class="nav-line"><a class="white-anchors" href="#signup">SIGN UP</a></li>
            </ul>
        </nav>
        <h2>Header Section</h2>
    </header>
    <section id="features">
        <h2>Features Section</h2>
    </section>
    <section id="details">
        <h2>Details Section</h2>
    </section>
    <section id="reviews">
        <h2>Reviews Section</h2>
    </section>
    <section id="plans">
        <h2>Plans Section</h2>
    </section>
    <section id="signup">
        <h2>Signup Section</h2>
    </section>
</body>

</html>
