<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
            h1{
        color: blue;
    }
    .yellow{
        background-color: rgb(255,255,0);
    }
    .highlight.yellow{
        color: #ff0000;
    }
    #special{
       background-color: hsl(120, 100%, 50%)
    }
    input{
        background-color: rgba(255, 0, 0, 0.5);
    }
    a:hover{
        color:hsla(0, 100%, 50%, 0.8)
    }
    .jinx{
        color: powderblue;
    }
    .emo_ah{
        color:violet
    }

    </style>
</head>

<body>
    <h1>Heading</h1>
    <p class="yellow">Paragraph with yellow background.</p>
    <p class="highlight yellow">This is a highlighted paragraph.</p>
    <p id="special">This is a special paragraph.</p>
    <input type="text" />
    <a href="#">Link</a>
    <h1 class="jinx">JINXXXXXX</h1>
    <h1 class="emo_ah">VI</h1>
</body>
</html>
