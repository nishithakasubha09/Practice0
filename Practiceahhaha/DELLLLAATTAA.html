<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <h1>Survey Form</h1>
</head>
<body>
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br><br>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age"><br><br>

        <label>Gender:</label>

        <label for="male">Male</label>
        <input type="radio" id="male" name="gender">

        <label for="feamale">Female</label>
        <input type="radio" id="female" name="gender"><br><br>

        <label for="favfood">Favorite Food</label>
        <select id="food" name="food">
            <option value="pizza">Pizza</option>
            <option value="pasta">Pasta</option>
            <option value="fries">Fries</option>
            <option value="Chips">Chips</option>
            <option value="home_cooked">Home Cooked</option>
            <option value="dessert">Dessert</option>
        </select> <br><br>
        
        <label for="liking">Do you like to cook?</label>
        <input type="checkbox" id="liking" name="liking">Yes <br><br>

        <label>Additional Comments</label>
        <textarea rows="5" cols="40"></textarea><br><br>

        <button>Submit</button>
    </form>
</body>
</html>
