<!DOCTYPE html>
<html>
<head>
<style>
.door {
    width: 200px;
    height: 350px;
    background-color: crimson;
    border: 5px solid #4a2c0a;
    border-radius: 5px 5px 0 0;
    position: relative;
    margin: 50px auto;
}

.knob {
    width: 30px;
    height: 25px;
    background-color: brown;
    border-radius: 50%;
    position: absolute;
    right: 15px;
    top: 120px;
}
.door2 {
    width: 200px;
    height: 350px;
    background-color: yellow;
    border: 5px solid #4a2c0a;
    border-radius: 5px 5px 0 0;
    position: relative;
    margin: 50px auto;
}


body{
    background-color: rgb(40, 39, 39);
}
</style>
</head>
<body>

<div class="door">
    <div class="knob"></div>
</div>

<div class="door2">
    <div class="knob"></div>
</div>

</body>
</html>
